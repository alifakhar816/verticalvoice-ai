name: Bug report
description: Something in VerticalVoice AI isn't working as expected
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Voice/telephony bugs are hard to reproduce
        from a description alone — filling in the vertical, provider mode,
        and call ID below usually gets us to a fix much faster.

  - type: dropdown
    id: vertical
    attributes:
      label: Vertical
      description: Which industry pack was in use when the bug happened?
      options:
        - Healthcare
        - Restaurant
        - Real Estate
        - Not vertical-specific / platform-wide
    validations:
      required: true

  - type: dropdown
    id: provider-mode
    attributes:
      label: Provider mode
      description: >
        Was this on the mock providers (local dev, no carrier credentials)
        or live providers (real Twilio/Telnyx/Ultravox/Retell)?
      options:
        - "Mock (VOICE_PROVIDER=mock / TELEPHONY_PROVIDER=mock)"
        - "Live — Twilio"
        - "Live — Telnyx"
        - "Live — Ultravox"
        - "Live — Retell"
        - Not applicable / not a call-related bug
    validations:
      required: true

  - type: input
    id: call-id
    attributes:
      label: Call ID (if applicable)
      description: >
        The call's ID/UUID from the dashboard's Call History or Call Detail
        page, if this bug is about a specific call. Leave blank if not
        applicable — do not paste raw transcripts or PII here.
      placeholder: e.g. 3f9c1a2e-... or the id shown in Call Detail
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps so we can reproduce it.
      placeholder: |
        1. Go to '...'
        2. Set TELEPHONY_PROVIDER=... / start a call as '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser (if UI-related), and whether this is local dev or the deployed instance.
      placeholder: |
        - Node: v20.x
        - OS: macOS 15 / Ubuntu 22.04 / ...
        - Browser: Chrome 128 (if relevant)
        - Instance: local dev / https://verticalvoice.alphaos.tech
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: >
        Paste any relevant server/browser console output. Please redact
        any tokens, secrets, or real customer/patient data before pasting.
      render: shell
    validations:
      required: false
